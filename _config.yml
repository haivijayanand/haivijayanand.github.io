theme: jekyll-theme-chirpy

# Site settings
lang: en
timezone: Asia/Kolkata

# Site title and tagline
title: K Vijay Anand
tagline: Enginner · Chennai, India

description: >-
  Technical articles, source code, and documents on aero-mechanical test systems,
  vibration diagnostics, data pipelines, planetary science, and more.
  By K Vijay Anand, Chennai.

url: "https://haivijayanand.github.io"
baseurl: ""

github:
  username: haivijayanand

# Author info
author:
  name: K Vijay Anand
  url: https://github.com/haivijayanand

# Avatar (place your photo as assets/img/avatar.jpg)
avatar: /assets/img/avatar.jpg

# Social links
social:
  name: K Vijay Anand
  email: ""
  links:
    - https://github.com/haivijayanand

# Theme mode
theme_mode: dark

# Enable table of contents on posts
toc: true

# Pagination
paginate: 10

# Comments — disable for now (can enable Disqus/Giscus later)
comments:
  active: ""

# Analytics — leave blank for now
analytics:
  google:
    id: ""

# MathJax (for equations in posts)
math: true

# Mermaid diagrams
mermaid: true

# Build settings
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true

# Collections
collections:
  tabs:
    output: true
    sort_by: order

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      math: true
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from build
exclude:
  - "*.gem"
  - "*.gemspec"


